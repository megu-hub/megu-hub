<svg width="100%" viewBox="0 0 480 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>megu terminal header</title>
  <desc>Terminal-style header for megu, Clara Fernández Pérez, backend dev and security enthusiast</desc>
  <defs>
    <pattern id="grid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#72243e" stroke-width="0.3" opacity="0.2"/>
    </pattern>
    <clipPath id="clip">
      <rect x="0" y="0" width="480" height="200" rx="10"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="480" height="200" rx="10" fill="#0a0108"/>
  <rect x="0" y="0" width="480" height="200" fill="url(#grid)" clip-path="url(#clip)"/>

  <rect x="0" y="0" width="480" height="32" rx="10" fill="#160810"/>
  <rect x="0" y="20" width="480" height="12" fill="#160810"/>
  <line x1="0" y1="32" x2="480" y2="32" stroke="#72243e" stroke-width="0.5" opacity="0.45"/>

  <circle cx="20" cy="16" r="5" fill="#3d1525"/>
  <circle cx="38" cy="16" r="5" fill="#2a0e1a"/>
  <circle cx="56" cy="16" r="5" fill="#1e0913"/>
  <circle cx="20" cy="16" r="2" fill="#72243e" opacity="0.7"/>

  <text x="240" y="21" text-anchor="middle" font-family="'Fira Code', monospace" font-size="10" fill="#72243e" opacity="0.5" letter-spacing="0.8">megu@github — bash — 80×24</text>

  <rect x="28" y="46" width="1.5" height="130" fill="#72243e" opacity="0.35"/>

  <text x="44" y="70" font-family="'Fira Code', monospace" font-size="11" fill="#72243e" opacity="0.7">$</text>
  <text x="58" y="70" font-family="'Fira Code', monospace" font-size="11" fill="#c9a0b8">whoami</text>

  <text x="58" y="100" font-family="'Fira Code', monospace" font-size="26" font-weight="700" fill="#D4537E" letter-spacing="3">megu</text>

  <text x="58" y="118" font-family="'Fira Code', monospace" font-size="10.5" fill="#72243e" opacity="0.6">// Clara Fernández Pérez</text>

  <text x="44" y="140" font-family="'Fira Code', monospace" font-size="11" fill="#72243e" opacity="0.7">$</text>
  <text x="58" y="140" font-family="'Fira Code', monospace" font-size="11" fill="#c9a0b8">cat role.txt</text>

  <text x="58" y="160" font-family="'Fira Code', monospace" font-size="10.5" fill="#c9a0b8" opacity="0.4">[</text>
  <text x="67" y="160" font-family="'Fira Code', monospace" font-size="10.5" fill="#D4537E" font-weight="700">+</text>
  <text x="76" y="160" font-family="'Fira Code', monospace" font-size="10.5" fill="#c9a0b8" opacity="0.4">]</text>
  <text x="88" y="160" font-family="'Fira Code', monospace" font-size="10.5" fill="#c9a0b8" opacity="0.75">backend · security · ctf</text>

  <text x="44" y="183" font-family="'Fira Code', monospace" font-size="11" fill="#72243e" opacity="0.7">$</text>
  <rect x="58" y="168" width="7" height="15" rx="1" fill="#D4537E" opacity="0.85">
    <animate attributeName="opacity" values="0.85;0.1;0.85" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <rect x="0.5" y="0.5" width="479" height="199" rx="9.5" fill="none" stroke="#72243e" stroke-width="0.8" opacity="0.4"/>
</svg>
