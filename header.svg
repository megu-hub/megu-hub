<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>megu terminal header</title>

  <rect x="0" y="0" width="680" height="200" rx="10" fill="#0d0208"/>
  <rect x="0" y="0" width="680" height="32" rx="10" fill="#1a0a0f"/>
  <rect x="0" y="18" width="680" height="14" fill="#1a0a0f"/>

  <circle cx="22" cy="16" r="6" fill="#72243e"/>
  <circle cx="42" cy="16" r="6" fill="#3d1525"/>
  <circle cx="62" cy="16" r="6" fill="#2a0e1a"/>

  <text x="340" y="21" text-anchor="middle" font-family="'Fira Code', monospace" font-size="11" fill="#72243e" opacity="0.7">megu-hub — bash — 80x24</text>

  <rect x="0" y="32" width="680" height="1" fill="#72243e" opacity="0.3"/>

  <text x="40" y="72" font-family="'Fira Code', monospace" font-size="13" fill="#72243e">$</text>
  <text x="56" y="72" font-family="'Fira Code', monospace" font-size="13" fill="#f4c0d1">whoami</text>

  <text x="40" y="100" font-family="'Fira Code', monospace" font-size="26" font-weight="700" fill="#D4537E" letter-spacing="2">megu</text>
  <text x="170" y="100" font-family="'Fira Code', monospace" font-size="13" fill="#72243e" opacity="0.8">// Clara Fernandez Perez</text>

  <text x="40" y="130" font-family="'Fira Code', monospace" font-size="13" fill="#72243e">$</text>
  <text x="56" y="130" font-family="'Fira Code', monospace" font-size="13" fill="#f4c0d1">cat role.txt</text>

  <text x="40" y="155" font-family="'Fira Code', monospace" font-size="12" fill="#f4c0d1" opacity="0.6">[</text>
  <text x="52" y="155" font-family="'Fira Code', monospace" font-size="12" fill="#D4537E">+</text>
  <text x="62" y="155" font-family="'Fira Code', monospace" font-size="12" fill="#f4c0d1" opacity="0.6">]</text>
  <text x="76" y="155" font-family="'Fira Code', monospace" font-size="12" fill="#f4c0d1">backend dev  |  security enthusiast  |  ctf player</text>

  <text x="40" y="178" font-family="'Fira Code', monospace" font-size="13" fill="#72243e">$</text>
  <rect x="56" y="164" width="9" height="16" fill="#D4537E" opacity="0.85">
    <animate attributeName="opacity" values="0.85;0;0.85" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <rect x="0" y="0" width="680" height="200" rx="10" fill="none" stroke="#72243e" stroke-width="1" opacity="0.4"/>
</svg>
